<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#07111B">
  <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_newlines }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/logo.svg' | relative_url }}">

  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description | strip_newlines }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url }}{{ page.url | relative_url }}">
  <meta property="og:image" content="{{ '/logo.svg' | absolute_url }}">
  <meta name="twitter:card" content="summary">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% seo title=false %}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="container header-inner">
      <a href="{{ '/' | relative_url }}" class="brand" aria-label="AppReagent home">
        <img src="{{ '/logo.svg' | relative_url }}" alt="" class="brand-logo" width="32" height="32">
        <span class="brand-name">AppReagent</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="#what">What</a>
        <a href="#how">How it thinks</a>
        <a href="#tools">Toolbelt</a>
        <a href="#install">Install</a>
        <a href="https://github.com/AppReagent/AppReagent" class="nav-cta">
          <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
          GitHub
        </a>
      </nav>
    </div>
  </header>

  <main id="main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-brand">
          <div class="brand">
            <img src="{{ '/logo.svg' | relative_url }}" alt="" class="brand-logo" width="28" height="28">
            <span class="brand-name">AppReagent</span>
          </div>
          <p class="footer-tagline">{{ site.tagline }}</p>
        </div>
        <div class="footer-col">
          <h4>Project</h4>
          <a href="https://github.com/AppReagent/AppReagent">Source</a>
          <a href="https://github.com/AppReagent/AppReagent/issues">Issues</a>
          <a href="https://github.com/AppReagent/AppReagent/releases">Releases</a>
        </div>
        <div class="footer-col">
          <h4>Reference</h4>
          <a href="https://github.com/AppReagent/AppReagent/blob/main/constitution.md">Constitution</a>
          <a href="https://github.com/AppReagent/AppReagent/blob/main/LICENSE">License</a>
          <a href="https://github.com/AppReagent/AppReagent/blob/main/README.md">Readme</a>
        </div>
      </div>
      <div class="footer-legal">
        <span>MIT Licensed</span>
        <span class="dot">·</span>
        <span>&copy; {{ site.time | date: '%Y' }} Evan Ram</span>
      </div>
    </div>
  </footer>
</body>
</html>
